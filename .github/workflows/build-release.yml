name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in source
        shell: python
        run: |
          version = "${{ steps.version.outputs.VERSION }}"
          path = "src/ethos_drive/__init__.py"
          with open(path, "r") as f:
              content = f.read()
          content = content.replace('__version__ = "1.0.0"', f'__version__ = "{version}"')
          with open(path, "w") as f:
              f.write(content)
          print(f"Version set to {version}")

      - name: Build executable
        run: |
          python -m PyInstaller `
            --name "EthOS Drive" `
            --windowed `
            --onefile `
            --icon "src\resources\icons\ethos-drive.ico" `
            --add-data "src\resources\icons;resources\icons" `
            --hidden-import "PySide6.QtSvg" `
            --hidden-import "PySide6.QtNetwork" `
            --hidden-import "PySide6.QtWidgets" `
            --hidden-import "PySide6.QtCore" `
            --hidden-import "PySide6.QtGui" `
            --hidden-import "engineio.async_drivers.threading" `
            --hidden-import "socketio" `
            --hidden-import "httpx" `
            --hidden-import "httpx._transports" `
            --hidden-import "httpcore" `
            --hidden-import "xxhash" `
            --hidden-import "keyring" `
            --hidden-import "keyring.backends" `
            --hidden-import "keyring.backends.Windows" `
            --hidden-import "watchdog" `
            --hidden-import "watchdog.observers" `
            --hidden-import "pydantic" `
            --hidden-import "pydantic.deprecated.decorator" `
            --hidden-import "packaging" `
            --collect-all "PySide6" `
            --collect-all "ethos_drive" `
            --paths "src" `
            --noconfirm `
            --clean `
            "src\ethos_drive\main.py"

      - name: Verify build output
        run: |
          if (Test-Path "dist\EthOS Drive.exe") {
            $size = (Get-Item "dist\EthOS Drive.exe").Length / 1MB
            Write-Host "Build OK: EthOS Drive.exe ($([math]::Round($size, 1)) MB)"
          } else {
            Write-Error "Build failed - no exe produced"
            exit 1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EthOS Drive v${{ steps.version.outputs.VERSION }}"
          body: |
            ## EthOS Drive v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download `EthOS.Drive.exe` below
            2. Run it — no installation needed
            3. Enter your EthOS server address, username, and password

            ### Auto-update
            Existing installations will be notified about this update automatically.
          files: |
            dist/EthOS Drive.exe
          draft: false
          prerelease: false
